buildscript {
    repositories {
        google()
        jcenter()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:3.1.4'
    }
}

apply plugin: 'com.android.library'

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
    compileSdkVersion safeExtGet('compileSdkVersion', 23)
    buildToolsVersion safeExtGet('buildToolsVersion', '27.0.3')

    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion', 16)
        targetSdkVersion safeExtGet('targetSdkVersion', 22)
        versionCode 1
        versionName "1.0"
    }
    lintOptions {
        abortOnError false
    }
}

repositories {
    mavenCentral()
    google()
    maven {
        url "https://maven.google.com"
    }
}

dependencies {
    implementation 'com.github.dryganets:sqlite-adapter:0.0.1'
    // android-database-sqlcipher is deprecated and its prebuilts may be incompatible
    // with Android 16 KB page-size devices. Use the modern SQLCipher Android AAR instead.
    implementation 'net.zetetic:sqlcipher-android:4.14.0@aar'
    // Required by sqlcipher-android (provides androidx.sqlite.db.* types such as SupportSQLiteDatabase)
    implementation 'androidx.sqlite:sqlite:2.6.2'
    implementation 'com.facebook.react:react-native:+'
}
